# Production compose for the bx-caller satellite on tools.bixingai.com.
# The service binds only to 127.0.0.1; host nginx proxies /bx-caller/* here.

name: bx-caller

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-pmtmyaggy}/bx-caller-api:${IMAGE_TAG:-prod}
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.prod}
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET}
      PORTAL_JWT_ALGORITHM: HS256
      WEBSOCKET_ACCESS_TOKEN: ${WEBSOCKET_ACCESS_TOKEN:-}
    volumes:
      - agent_data:/app/agent_data
      - logs_data:/app/logs
    ports:
      - "127.0.0.1:8102:8000"
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: ${REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-pmtmyaggy}/bx-caller-web:${IMAGE_TAG:-prod}
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://api:8000
      NEXT_PUBLIC_BASE_PATH: /bx-caller
    ports:
      - "127.0.0.1:3102:3000"
    depends_on:
      - api

volumes:
  redis_data:
    external: true
    name: bx-caller_redis_data
  agent_data:
    external: true
    name: bx-caller_agent_data
  logs_data:
    external: true
    name: bx-caller_logs_data
