name: deploy

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_API: pmtmyaggy/bx-caller-api
  IMAGE_WEB: pmtmyaggy/bx-caller-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_API }}:prod
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_BASE_PATH=/bx-caller
          tags: |
            ${{ env.IMAGE_WEB }}:prod
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/bx-caller/

      - name: Pull image and restart stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.sha_short }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/bx-caller
            export IMAGE_TAG

            pulled=0
            for i in 1 2 3 4 5; do
              if docker compose -f docker-compose.prod.yml --env-file .env.prod pull; then
                pulled=1; break
              fi
              echo "pull attempt $i failed, waiting 15s..."
              sleep 15
            done
            if [ "$pulled" != "1" ]; then
              echo "pull failed after 5 attempts" >&2
              exit 1
            fi

            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            docker image prune -f
            sleep 8
            curl -fsS http://127.0.0.1:8102/api/health
            curl -fsS http://127.0.0.1:3102/bx-caller >/dev/null
            echo "Deploy OK: $IMAGE_TAG"
