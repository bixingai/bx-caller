services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./agent_data:/app/agent_data
      - ./logs:/app/logs
    ports:
      - "8102:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BASE_PATH: ""
    environment:
      API_PROXY_TARGET: http://api:8000
      NEXT_PUBLIC_BASE_PATH: ""
    ports:
      - "3102:3000"
    depends_on:
      - api
    command: npm run dev -- -H 0.0.0.0

volumes:
  redis_data:
